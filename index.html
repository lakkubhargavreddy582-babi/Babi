<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Professional To-Do List</title>
  <style>
    :root {
      --bg: #f3f5fb;
      --surface: #ffffff;
      --surface-muted: #f8f9ff;
      --text: #1b2335;
      --subtext: #667089;
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --success: #059669;
      --danger: #dc2626;
      --border: #e5e7ef;
      --shadow: 0 12px 30px rgba(22, 28, 45, 0.08);
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top right, #e7e9ff 0%, transparent 32%), var(--bg);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app {
      width: min(900px, 100%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .header {
      padding: 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: space-between;
      align-items: baseline;
      background: linear-gradient(180deg, #ffffff 0%, #fbfbff 100%);
    }

    .header h1 {
      margin: 0;
      font-size: clamp(1.5rem, 1.2rem + 1vw, 2rem);
      letter-spacing: -0.03em;
    }

    .header p {
      margin: 0;
      color: var(--subtext);
      font-size: 0.95rem;
    }

    .content {
      padding: 20px;
      display: grid;
      gap: 14px;
    }

    .panel {
      background: var(--surface-muted);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
    }

    .task-form {
      display: grid;
      grid-template-columns: 1fr 140px 170px auto;
      gap: 10px;
    }

    input, select, button {
      font: inherit;
      border-radius: 10px;
      border: 1px solid var(--border);
      padding: 10px 12px;
      background: #fff;
      color: var(--text);
    }

    input:focus, select:focus {
      outline: 2px solid rgba(79, 70, 229, 0.25);
      border-color: var(--primary);
    }

    button {
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
      font-weight: 600;
    }

    .btn-primary:hover { background: var(--primary-hover); }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: center;
    }

    .filters {
      display: inline-flex;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
    }

    .filters button {
      border: 0;
      border-right: 1px solid var(--border);
      background: transparent;
      padding: 9px 14px;
      color: var(--subtext);
    }

    .filters button:last-child { border-right: 0; }
    .filters button.active {
      background: #ecebff;
      color: #302c9b;
      font-weight: 600;
    }

    .stats {
      color: var(--subtext);
      font-size: 0.92rem;
      white-space: nowrap;
    }

    .task-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 10px;
    }

    .task-item {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: start;
    }

    .task-item.completed .task-title {
      text-decoration: line-through;
      color: #8a92a5;
    }

    .task-title {
      margin: 0;
      font-weight: 600;
      line-height: 1.3;
    }

    .meta {
      margin-top: 4px;
      font-size: 0.82rem;
      color: var(--subtext);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .badge {
      border-radius: 999px;
      padding: 2px 8px;
      font-weight: 600;
      font-size: 0.75rem;
      display: inline-block;
      border: 1px solid transparent;
    }

    .priority-low { background: #ecfdf3; color: #047857; border-color: #a7f3d0; }
    .priority-medium { background: #fff7ed; color: #b45309; border-color: #fed7aa; }
    .priority-high { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }

    .actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      border: 1px solid var(--border);
      background: #fff;
      padding: 6px 9px;
      color: var(--subtext);
    }

    .icon-btn:hover { color: var(--text); }
    .icon-btn.delete:hover { color: var(--danger); border-color: #fecaca; background: #fef2f2; }

    .empty {
      text-align: center;
      color: var(--subtext);
      padding: 26px;
      border: 1px dashed #c7ccdc;
      border-radius: 12px;
      background: #fff;
    }

    @media (max-width: 740px) {
      .task-form { grid-template-columns: 1fr 1fr; }
      .task-form button { grid-column: span 2; }
      .toolbar { grid-template-columns: 1fr; }
      .stats { order: 3; }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="To-do list app">
    <header class="header">
      <h1>TaskFlow Pro</h1>
      <p>Organize your priorities and get things done.</p>
    </header>

    <section class="content">
      <form id="taskForm" class="panel task-form" autocomplete="off">
        <input id="taskInput" type="text" placeholder="What needs to be done?" required maxlength="140" />
        <select id="priorityInput" aria-label="Task priority">
          <option value="low">Low priority</option>
          <option value="medium" selected>Medium priority</option>
          <option value="high">High priority</option>
        </select>
        <input id="dueDateInput" type="date" aria-label="Due date" />
        <button class="btn-primary" type="submit">Add Task</button>
      </form>

      <div class="panel toolbar">
        <input id="searchInput" type="search" placeholder="Search tasks..." aria-label="Search tasks" />
        <div class="filters" role="tablist" aria-label="Task filters">
          <button type="button" class="active" data-filter="all">All</button>
          <button type="button" data-filter="active">Active</button>
          <button type="button" data-filter="completed">Completed</button>
        </div>
        <button id="clearCompletedBtn" type="button">Clear Completed</button>
      </div>

      <div class="panel">
        <div class="stats" id="stats"></div>
        <ul class="task-list" id="taskList"></ul>
      </div>
    </section>
  </main>

  <script>
    const state = {
      tasks: JSON.parse(localStorage.getItem('taskflow.tasks') || '[]'),
      filter: 'all',
      search: ''
    };

    const els = {
      form: document.getElementById('taskForm'),
      taskInput: document.getElementById('taskInput'),
      priorityInput: document.getElementById('priorityInput'),
      dueDateInput: document.getElementById('dueDateInput'),
      searchInput: document.getElementById('searchInput'),
      taskList: document.getElementById('taskList'),
      stats: document.getElementById('stats'),
      clearCompletedBtn: document.getElementById('clearCompletedBtn'),
      filters: [...document.querySelectorAll('.filters button')]
    };

    const saveTasks = () => {
      localStorage.setItem('taskflow.tasks', JSON.stringify(state.tasks));
    };

    const formatDate = (dateString) => {
      if (!dateString) return 'No due date';
      const date = new Date(`${dateString}T00:00:00`);
      return date.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
    };

    const getFilteredTasks = () => {
      const query = state.search.trim().toLowerCase();
      return state.tasks.filter((task) => {
        const matchesFilter =
          state.filter === 'all' ||
          (state.filter === 'active' && !task.completed) ||
          (state.filter === 'completed' && task.completed);
        const matchesSearch = task.title.toLowerCase().includes(query);
        return matchesFilter && matchesSearch;
      });
    };

    const render = () => {
      const visibleTasks = getFilteredTasks();
      const completedCount = state.tasks.filter((task) => task.completed).length;
      const activeCount = state.tasks.length - completedCount;

      els.stats.textContent = `${activeCount} active • ${completedCount} completed • ${state.tasks.length} total`;

      els.taskList.innerHTML = visibleTasks.length
        ? visibleTasks.map((task) => `
            <li class="task-item ${task.completed ? 'completed' : ''}" data-id="${task.id}">
              <input type="checkbox" ${task.completed ? 'checked' : ''} aria-label="Mark task complete" />
              <div>
                <p class="task-title">${task.title}</p>
                <div class="meta">
                  <span class="badge priority-${task.priority}">${task.priority} priority</span>
                  <span>Due: ${formatDate(task.dueDate)}</span>
                  <span>Created: ${formatDate(task.createdAt.slice(0, 10))}</span>
                </div>
              </div>
              <div class="actions">
                <button class="icon-btn delete" type="button" aria-label="Delete task">Delete</button>
              </div>
            </li>`).join('')
        : '<li class="empty">No tasks found. Add your first task to get started.</li>';

      els.filters.forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.filter === state.filter);
      });
    };

    els.form.addEventListener('submit', (event) => {
      event.preventDefault();
      const title = els.taskInput.value.trim();
      if (!title) return;

      state.tasks.unshift({
        id: crypto.randomUUID(),
        title,
        priority: els.priorityInput.value,
        dueDate: els.dueDateInput.value,
        completed: false,
        createdAt: new Date().toISOString()
      });

      saveTasks();
      els.form.reset();
      els.priorityInput.value = 'medium';
      els.taskInput.focus();
      render();
    });

    els.searchInput.addEventListener('input', (event) => {
      state.search = event.target.value;
      render();
    });

    els.filters.forEach((button) => {
      button.addEventListener('click', () => {
        state.filter = button.dataset.filter;
        render();
      });
    });

    els.taskList.addEventListener('click', (event) => {
      const row = event.target.closest('.task-item');
      if (!row) return;
      const task = state.tasks.find((item) => item.id === row.dataset.id);
      if (!task) return;

      if (event.target.matches('input[type="checkbox"]')) {
        task.completed = event.target.checked;
        saveTasks();
        render();
      }

      if (event.target.matches('.delete')) {
        state.tasks = state.tasks.filter((item) => item.id !== task.id);
        saveTasks();
        render();
      }
    });

    els.clearCompletedBtn.addEventListener('click', () => {
      state.tasks = state.tasks.filter((task) => !task.completed);
      saveTasks();
      render();
    });

    render();
  </script>
</body>
</html>
